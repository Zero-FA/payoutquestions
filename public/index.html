<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Apex FAQ Answerer</title>
  <style>
    :root {
      --bg: #0b1020;
      --panel: #121933;
      --panel2: #182244;
      --panel3: #0f1733;
      --text: #eef2ff;
      --muted: #aeb8d6;
      --border: #2b3768;
      --accent: #7aa2ff;
      --accent-soft: rgba(122, 162, 255, 0.14);
      --good: #98f5ae;
      --warn: #ffb4b4;
      --shadow: 0 16px 45px rgba(0, 0, 0, 0.28);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Inter, Arial, Helvetica, sans-serif;
      background: linear-gradient(180deg, #08101f 0%, #101735 100%);
      color: var(--text);
    }

    .wrap {
      max-width: 1160px;
      margin: 0 auto;
      padding: 22px 16px 28px;
    }

    h1 {
      margin: 0 0 18px;
      font-size: 28px;
      line-height: 1.1;
      letter-spacing: -0.02em;
    }

    .grid {
      display: grid;
      grid-template-columns: 420px 1fr;
      gap: 16px;
      align-items: start;
    }

    .card {
      background: rgba(18, 25, 51, 0.96);
      border: 1px solid var(--border);
      border-radius: 18px;
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    .card-head {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.02);
    }

    .card-head h2 {
      margin: 0;
      font-size: 17px;
    }

    .card-body {
      padding: 16px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 700;
    }

    textarea {
      width: 100%;
      min-height: 180px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: var(--panel2);
      color: var(--text);
      padding: 14px;
      font: inherit;
      resize: vertical;
      outline: none;
      line-height: 1.5;
    }

    textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(122, 162, 255, 0.16);
    }

    .row {
      display: flex;
      gap: 10px;
      margin-top: 12px;
      flex-wrap: wrap;
    }

    button {
      border: 0;
      border-radius: 12px;
      padding: 11px 15px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.08s ease, opacity 0.2s ease;
    }

    button:hover {
      opacity: 0.96;
    }

    button:active {
      transform: translateY(1px);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .primary {
      background: var(--accent);
      color: #081225;
    }

    .secondary {
      background: #27345f;
      color: var(--text);
      border: 1px solid var(--border);
    }

    .status {
      margin-top: 12px;
      color: var(--muted);
      font-size: 13px;
      min-height: 18px;
    }

    .good {
      color: var(--good);
    }

    .warn {
      color: var(--warn);
    }

    .chat {
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-height: 320px;
    }

    .bubble-wrap {
      display: none;
      flex-direction: column;
      gap: 5px;
    }

    .bubble-wrap.show {
      display: flex;
    }

    .bubble-wrap.user {
      align-items: flex-end;
    }

    .bubble-wrap.assistant,
    .bubble-wrap.source {
      align-items: stretch;
    }

    .bubble-label {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 0 2px;
    }

    .bubble {
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.65;
      padding: 14px 16px;
      border-radius: 16px;
      border: 1px solid var(--border);
    }

    .bubble.user {
      background: linear-gradient(180deg, #28427d 0%, #22386a 100%);
      color: #f6f8ff;
      max-width: 85%;
      border-bottom-right-radius: 6px;
    }

    .bubble.assistant {
      background: #0d142b;
      min-height: 120px;
      border-bottom-left-radius: 6px;
    }

    .bubble.source {
      background: var(--panel3);
      border-bottom-left-radius: 6px;
      padding: 12px 14px;
    }

    .placeholder {
      color: var(--muted);
    }

    .source-link {
      display: inline-block;
      color: var(--accent);
      text-decoration: none;
      font-weight: 700;
      line-height: 1.4;
    }

    .source-link:hover {
      text-decoration: underline;
    }

    .source-meta {
      font-size: 12px;
      color: var(--muted);
      margin-top: 4px;
    }

    .answer-shell {
      background: linear-gradient(180deg, rgba(255,255,255,0.02) 0%, rgba(255,255,255,0) 100%);
      border: 1px solid rgba(122, 162, 255, 0.08);
      border-radius: 16px;
      padding: 12px;
    }

    @media (max-width: 920px) {
      .grid {
        grid-template-columns: 1fr;
      }

      textarea {
        min-height: 140px;
      }

      .bubble.user {
        max-width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Apex FAQ Answerer</h1>

    <div class="grid">
      <section class="card">
        <div class="card-head">
          <h2>Ask a Question</h2>
        </div>
        <div class="card-body">
          <label for="questionInput">Person's question</label>
          <textarea id="questionInput" placeholder="Type a question and press Enter to send. Use Shift+Enter for a new line."></textarea>

          <div class="row">
            <button id="answerBtn" class="primary">Answer Question</button>
            <button id="clearBtn" class="secondary">Clear</button>
          </div>

          <div id="status" class="status">Ready.</div>
        </div>
      </section>

      <section class="card">
        <div class="card-head">
          <h2>Answer</h2>
        </div>
        <div class="card-body">
          <div class="answer-shell">
            <div class="chat">
              <div id="userQuestionWrap" class="bubble-wrap user">
                <div class="bubble-label">User Question</div>
                <div id="userQuestionBox" class="bubble user"></div>
              </div>

              <div class="bubble-wrap assistant show">
                <div class="bubble-label">Answer</div>
                <div id="answerBox" class="bubble assistant"><span class="placeholder">Your answer will appear here.</span></div>
              </div>

              <div id="sourceWrap" class="bubble-wrap source">
                <div class="bubble-label">Source</div>
                <div id="sourceBox" class="bubble source"></div>
              </div>
            </div>
          </div>
        </div>
      </section>
    </div>
  </div>

  <script>
    const answerBtn = document.getElementById("answerBtn");
    const clearBtn = document.getElementById("clearBtn");
    const questionInput = document.getElementById("questionInput");
    const answerBox = document.getElementById("answerBox");
    const userQuestionWrap = document.getElementById("userQuestionWrap");
    const userQuestionBox = document.getElementById("userQuestionBox");
    const sourceWrap = document.getElementById("sourceWrap");
    const sourceBox = document.getElementById("sourceBox");
    const status = document.getElementById("status");

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    async function askQuestion() {
      const question = questionInput.value.trim();

      if (!question) {
        answerBox.innerHTML = '<span class="placeholder">Please enter a question first.</span>';
        sourceWrap.classList.remove("show");
        sourceBox.innerHTML = "";
        status.innerHTML = '<span class="warn">No question entered.</span>';
        return;
      }

      userQuestionWrap.classList.add("show");
      userQuestionBox.textContent = question;
      questionInput.value = "";

      answerBtn.disabled = true;
      answerBox.innerHTML = '<span class="placeholder">Thinking...</span>';
      sourceWrap.classList.remove("show");
      sourceBox.innerHTML = "";
      status.textContent = "Sending question...";

      try {
        const res = await fetch("/api/ask", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ question })
        });

        const raw = await res.text();

        let data;
        try {
          data = JSON.parse(raw);
        } catch {
          throw new Error(raw.slice(0, 300) || "Server returned a non-JSON response");
        }

        if (!res.ok) {
          throw new Error(data.error || "Request failed");
        }

        answerBox.textContent = data.answer || "No answer returned.";

        if (data.sourceUrl) {
          sourceWrap.classList.add("show");
          sourceBox.innerHTML = `
            <a class="source-link" href="${escapeHtml(data.sourceUrl)}" target="_blank" rel="noopener noreferrer">
              ${escapeHtml(data.sourceTitle || data.sourceFile || data.sourceUrl)}
            </a>
            <div class="source-meta">Opens the original support article</div>
          `;
        } else if (data.sourceTitle || data.sourceFile) {
          sourceWrap.classList.add("show");
          sourceBox.innerHTML = `
            <div>${escapeHtml(data.sourceTitle || data.sourceFile)}</div>
          `;
        } else {
          sourceWrap.classList.remove("show");
        }

        status.innerHTML = '<span class="good">Done.</span>';
      } catch (err) {
        console.error(err);
        answerBox.textContent = "API error: " + err.message;
        sourceWrap.classList.remove("show");
        sourceBox.innerHTML = "";
        status.innerHTML = '<span class="warn">API request failed.</span>';
      } finally {
        answerBtn.disabled = false;
      }
    }

    answerBtn.addEventListener("click", askQuestion);

    questionInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        askQuestion();
      }
    });

    clearBtn.addEventListener("click", () => {
      questionInput.value = "";
      userQuestionWrap.classList.remove("show");
      userQuestionBox.textContent = "";
      answerBox.innerHTML = '<span class="placeholder">Your answer will appear here.</span>';
      sourceWrap.classList.remove("show");
      sourceBox.innerHTML = "";
      status.textContent = "Ready.";
      questionInput.focus();
    });
  </script>
</body>
</html>
