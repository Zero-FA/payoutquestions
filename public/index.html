<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Apex Payout FAQ Answerer</title>
  <style>
    :root {
      --bg: #0b1020;
      --panel: #121933;
      --panel2: #1a2345;
      --text: #eef2ff;
      --muted: #aeb8d6;
      --border: #2b3768;
      --accent: #7aa2ff;
      --good: #98f5ae;
      --warn: #ffb4b4;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, Arial, Helvetica, sans-serif;
      background: linear-gradient(180deg, #0a0f1d 0%, #101735 100%);
      color: var(--text);
    }

    .wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 28px 18px 36px;
    }

    h1 {
      margin: 0 0 22px;
      font-size: 32px;
      line-height: 1.15;
    }

    .grid {
      display: grid;
      grid-template-columns: 1.05fr 0.95fr;
      gap: 18px;
    }

    .card {
      background: rgba(18, 25, 51, 0.96);
      border: 1px solid var(--border);
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 16px 45px rgba(0, 0, 0, 0.35);
    }

    .card-head {
      padding: 16px 18px;
      border-bottom: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.02);
    }

    .card-head h2 {
      margin: 0;
      font-size: 18px;
    }

    .card-body {
      padding: 18px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 700;
    }

    textarea {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: var(--panel2);
      color: var(--text);
      padding: 14px;
      font: inherit;
      resize: vertical;
      outline: none;
    }

    textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(122, 162, 255, 0.18);
    }

    #questionInput {
      min-height: 160px;
    }

    .result-box {
      background: #0d142b;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      line-height: 1.7;
    }

    .question-box {
      min-height: 90px;
      white-space: pre-wrap;
      margin-bottom: 14px;
    }

    .answer-box {
      min-height: 220px;
      white-space: pre-wrap;
    }

    .source-box {
      margin-top: 14px;
      padding: 12px 14px;
      background: #0d142b;
      border: 1px solid var(--border);
      border-radius: 12px;
      line-height: 1.6;
    }

    .section-label {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .source-link {
      color: var(--accent);
      text-decoration: none;
      font-weight: 700;
    }

    .source-link:hover {
      text-decoration: underline;
    }

    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 14px;
    }

    button {
      border: 0;
      border-radius: 12px;
      padding: 12px 16px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.08s ease, opacity 0.2s ease;
    }

    button:hover {
      opacity: 0.96;
    }

    button:active {
      transform: translateY(1px);
    }

    button:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }

    .primary {
      background: var(--accent);
      color: #081225;
    }

    .secondary {
      background: #27345f;
      color: var(--text);
      border: 1px solid var(--border);
    }

    .status {
      margin-top: 12px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .good { color: var(--good); }
    .warn { color: var(--warn); }

    @media (max-width: 900px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Apex Payout FAQ Answerer</h1>

    <div class="grid">
      <section class="card">
        <div class="card-head">
          <h2>Ask a Question</h2>
        </div>
        <div class="card-body">
          <label for="questionInput">Person's question</label>
          <textarea id="questionInput" placeholder="Example: after i request, do my trading days count towards this payout or the next one?"></textarea>

          <div class="row">
            <button id="answerBtn" class="primary">Answer Question</button>
            <button id="clearBtn" class="secondary">Clear</button>
          </div>

          <div id="status" class="status">Ready.</div>
        </div>
      </section>

      <section class="card">
        <div class="card-head">
          <h2>Answer</h2>
        </div>
        <div class="card-body">
          <div id="userQuestionWrap" class="result-box question-box" style="display:none;">
            <div class="section-label">User Question</div>
            <div id="userQuestionBox"></div>
          </div>

          <div id="answerWrap" class="result-box answer-box">
            <div class="section-label">Answer</div>
            <div id="answerBox">Your answer will appear here.</div>
          </div>

          <div id="sourceBox" class="source-box" style="display:none;"></div>
        </div>
      </section>
    </div>
  </div>

  <script>
    const answerBtn = document.getElementById("answerBtn");
    const clearBtn = document.getElementById("clearBtn");
    const questionInput = document.getElementById("questionInput");
    const answerBox = document.getElementById("answerBox");
    const userQuestionWrap = document.getElementById("userQuestionWrap");
    const userQuestionBox = document.getElementById("userQuestionBox");
    const sourceBox = document.getElementById("sourceBox");
    const status = document.getElementById("status");

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    async function askQuestion() {
      const question = questionInput.value.trim();

      if (!question) {
        answerBox.textContent = "Please enter a question first.";
        sourceBox.style.display = "none";
        sourceBox.innerHTML = "";
        status.innerHTML = '<span class="warn">No question entered.</span>';
        return;
      }

      userQuestionWrap.style.display = "block";
      userQuestionBox.textContent = question;

      questionInput.value = "";

      answerBtn.disabled = true;
      answerBox.textContent = "Thinking...";
      sourceBox.style.display = "none";
      sourceBox.innerHTML = "";
      status.textContent = "Sending question...";

      try {
        const res = await fetch("/api/ask", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ question })
        });

        const raw = await res.text();

        let data;
        try {
          data = JSON.parse(raw);
        } catch {
          throw new Error(raw.slice(0, 300) || "Server returned a non-JSON response");
        }

        if (!res.ok) {
          throw new Error(data.error || "Request failed");
        }

        answerBox.textContent = data.answer || "No answer returned.";

        if (data.sourceUrl) {
          sourceBox.style.display = "block";
          sourceBox.innerHTML = `
            <div class="section-label">Source</div>
            <a class="source-link" href="${escapeHtml(data.sourceUrl)}" target="_blank" rel="noopener noreferrer">
              ${escapeHtml(data.sourceTitle || data.sourceFile || data.sourceUrl)}
            </a>
          `;
        } else if (data.sourceTitle || data.sourceFile) {
          sourceBox.style.display = "block";
          sourceBox.innerHTML = `
            <div class="section-label">Source</div>
            <div>${escapeHtml(data.sourceTitle || data.sourceFile)}</div>
          `;
        }

        status.innerHTML = '<span class="good">Done.</span>';
      } catch (err) {
        console.error(err);
        answerBox.textContent = "API error: " + err.message;
        sourceBox.style.display = "none";
        sourceBox.innerHTML = "";
        status.innerHTML = '<span class="warn">API request failed.</span>';
      } finally {
        answerBtn.disabled = false;
      }
    }

    answerBtn.addEventListener("click", askQuestion);

    questionInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        askQuestion();
      }
    });

    clearBtn.addEventListener("click", () => {
      questionInput.value = "";
      userQuestionWrap.style.display = "none";
      userQuestionBox.textContent = "";
      answerBox.textContent = "Your answer will appear here.";
      sourceBox.style.display = "none";
      sourceBox.innerHTML = "";
      status.textContent = "Ready.";
      questionInput.focus();
    });
  </script>
</body>
</html>
